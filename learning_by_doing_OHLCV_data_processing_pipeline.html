<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:," />
  <title>Learning by Doing — OHLCV Data Processing Pipeline (Track A: XGBoost / LSTM)</title>
<!--
  ============================================================================
  LEARNING BY DOING - single-file app (zero dependencies, zero build)

  What this is: an interactive map of the Track-A per-asset trading pipelines
  (the unified 10000-xgb-lstm project): how raw OHLCV bars become a sealed,
  one-shot out-of-sample verdict per asset - and, block by block, HOW WE
  THOUGHT and WHAT WE LEARNED while planning a system precise enough to
  recommend assets through its data processing.

  Two models share ONE procedure (the LSTM engine is a port of the XGBoost
  parent). The MODEL SWITCH (top of the left panel) flips only the blocks
  whose logic depends on the model:
      XGBoost - 1h bars, multi-timeframe features, H=24, embargo 35
      LSTM    - daily bars, 60-session window,     H=10, embargo 10

  MAP FOR AGENTS - edit in the right section:
    CSS  [S1] color tokens        [S2] layout (workspace/panels)
         [S3] inventory (left)    [S4] canvas + bricks + lane separators/heads
         [S5] visualizations      [S6] inspector (right)  [S7] toast/media
    JS   [J0] MODEL SWITCH - 'xgb' | 'lstm' + pick() variant resolver
         [J1] DATA   - GROUPS + MODULES (procedure contracts; any field may
                       be a shared value OR a {xgb:..., lstm:...} variant)
         [J1b] LEARNING - per-block {goal, decisions, lessons, principles}
         [J2] VIZ    - mini-visualization registry: 1 key = 1 brick kind
         [J3] LAYOUT - bottom-up ladder; ORDER = MODULES declaration order,
                       SEALED (this is documentation - blocks cannot be moved)
         [J6] CANVAS - brick render, sticky lane heads, pan/zoom (read-only)
         [J7] INVENTORY + INSPECTOR - side panels, learning accordion
         [J8] BOOT   - start

  SEALED DOCUMENTATION: the ladder order IS the pipeline order, fixed by
  declaration. There is no drag&drop, no persistence, no hidden state -
  a reload always shows the canonical flow, bottom to top.

  Content provenance: docs/PROJECT_STATE.md + the sealed stores
  (xgb/data/oos_metrics.db 498 rows, lstm/oos_metrics.db 496 rows) and the
  committed benchmark feeds. Numbers here are frozen quotes of those sealed
  artifacts. On any discrepancy the sealed stores win.
  ============================================================================
-->
  <style>
    /* [S1] tokens */
    :root{
      --bg-root:#080A0D;
      --bg-panel:#0D1117;
      --line:#27303A;
      --line-soft:#1B232C;
      --text:#E8EDF2;
      --muted:#89929D;
      --amber:#FFA028;
      --green:#44D17A;
      --red:#FF5C6C;
      --cyan:#54B8FF;
      --v-src:#ABA99F;
      --v-store:#2BB587;
      --v-green:#86B23A;
      --v-amber:#D89A3A;
      --v-good:#34C96A;
      --v-fail:#F26B6A;
      --v-blue:#5CB0FF;
      --v-pink:#E673A3;
      --v-gray:#8a8980;
    }
    *{box-sizing:border-box}
    html,body{height:100%;min-width:1024px}
    body{margin:0;background:var(--bg-root);color:var(--text);font:12px/1.35 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;overflow:hidden}
    button,input{font:inherit}
    button{border:0;background:transparent;color:var(--text);padding:0;cursor:pointer}
    button:hover{color:var(--amber)}
    button:focus-visible{outline:1px solid var(--amber);outline-offset:-1px}

    /* [S2] layout */
    .terminal{height:100vh;display:grid;grid-template-rows:minmax(0,1fr);background:var(--line);gap:1px}
    .workspace{display:grid;grid-template-columns:18% minmax(0,1fr) 24%;gap:1px;min-height:0;background:var(--line)}
    .panel{min-width:0;min-height:0;overflow:hidden;display:flex;flex-direction:column;background:var(--bg-panel)}

    /* [S3] inventory + model switch */
    .model-switch{padding:7px;border-bottom:1px solid var(--line);display:flex;gap:4px}
    .model-btn{flex:1;font-size:9px;letter-spacing:.05em;color:var(--muted);padding:5px 4px;border:1px solid var(--line);text-align:center}
    .model-btn.active{color:var(--bg-root);background:var(--amber);border-color:var(--amber);font-weight:800}
    .inventory-controls{padding:7px;border-bottom:1px solid var(--line);display:flex;gap:4px;flex-wrap:wrap}
    .filter{font-size:9px;color:var(--muted);padding:3px 5px;border:1px solid transparent}
    .filter.active{color:var(--amber);border-color:var(--amber)}
    .module-list{overflow:auto;min-height:0;padding:5px 0}
    .inventory-group{padding:5px 7px 3px;color:var(--muted);font-size:9px;letter-spacing:.08em;border-top:1px solid var(--line-soft)}
    .inventory-group:first-child{border-top:0}
    .inventory-row{height:28px;display:grid;grid-template-columns:33px 1fr;align-items:center;gap:6px;padding:0 8px;cursor:pointer;border-left:3px solid transparent;color:#C7D0D8}
    .inventory-row:hover,.inventory-row.selected{background:#111820;color:var(--text)}
    .inventory-row.selected{border-left-color:var(--amber)}
    .inventory-id{font-size:10px;color:var(--text)}
    .inventory-name{font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* [S4] canvas + bricks */
    .flow-panel{position:relative}
    .flow-viewport{position:relative;overflow:hidden;flex:1;background-color:var(--bg-root);background-image:linear-gradient(var(--line-soft) 1px,transparent 1px),linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);background-size:20px 20px}
    .flow-canvas{position:relative;width:1400px;height:2600px;transform-origin:0 0;will-change:transform;cursor:grab} /* size overridden by [J8] BOOT */
    .flow-canvas.panning{cursor:grabbing}
    .lane-sep{position:absolute;top:0;bottom:0;width:1px;background:var(--line);pointer-events:none}
    .lane-heads{position:absolute;top:0;left:0;right:0;height:26px;pointer-events:none;z-index:8;overflow:hidden}
    .lane-head{position:absolute;top:0;height:26px;line-height:26px;padding:0 4px;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:linear-gradient(180deg,var(--bg-root) 30%,rgba(8,10,13,.72) 65%,transparent)}

    .lego{position:absolute;width:184px;background:#0D1117;border:1px solid #46515D;border-left:4px solid var(--accent);padding:15px 8px 6px;cursor:pointer;user-select:none;box-shadow:4px 4px 0 rgba(0,0,0,.18);transition:top .15s ease,left .15s ease}
    .lego:hover{border-color:#8A96A3;z-index:5}
    .lego.selected{outline:1px solid var(--amber);outline-offset:2px;z-index:6}
    .studs{position:absolute;top:-5px;left:9px;display:flex;gap:7px}
    .stud{width:13px;height:5px;border:1px solid var(--accent);border-bottom:0;background:#161D25}
    .lego-top{display:flex;gap:7px;align-items:baseline}
    .lego-id{color:var(--accent);font-size:10px;font-weight:800}
    .lego-title{font-size:10px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700}
    .lego-variant{flex:0 0 auto;font-size:8px;color:var(--amber);font-weight:800}
    /* [S5] visualizations - shared */
    .viz-svg{display:block;width:100%;height:auto;margin-top:5px}
    .viz-label{margin-top:6px;text-align:center;font-size:8px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .viz-tbl{width:100%;border-collapse:collapse;table-layout:fixed;margin-top:5px}
    .viz-tbl th,.viz-tbl td{border:1px solid var(--line);text-align:center;overflow:hidden;white-space:nowrap}
    .viz-tbl th{height:13px;font-size:7px;font-weight:800;color:var(--text);background:rgba(255,255,255,.05)}
    .viz-tbl td{height:12px;font-size:6.5px;color:#9AA4AE}
    .ohlcv-x{font-size:1.5em;font-weight:800;vertical-align:-1px;margin-right:1px}
    .zip-chain{margin-top:6px;display:flex;align-items:flex-start;justify-content:center;gap:3px}
    .zip-node{display:flex;flex-direction:column;align-items:center;gap:3px}
    .zip-box{width:28px;height:19px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;letter-spacing:.04em;color:var(--accent);background:rgba(85,199,164,.12);border:1px solid var(--accent);border-radius:2px}
    .zip-tk{font-size:7px;font-weight:700;letter-spacing:.03em;color:var(--muted)}
    .zip-dot{flex:0 0 auto;width:4px;height:4px;border-radius:50%;background:var(--accent);opacity:.55;margin-top:7px}
    .zip-ell{flex:0 0 auto;color:var(--accent);font-weight:800;letter-spacing:1px;opacity:.7;margin-top:4px}
    .qc-list{margin-top:6px;display:grid;gap:2px}
    .qc-row{display:grid;grid-template-columns:52px 1fr 10px;align-items:center;font-size:7.5px;color:#9AA4AE}
    .qc-row b{color:var(--text);font-weight:800}
    .qc-ok{color:var(--v-good);font-weight:800;justify-self:end}
    .xt{position:relative;background:linear-gradient(to top right,transparent 47%,#46515D 47%,#46515D 53%,transparent 53%)!important}
    .xt .x{position:absolute;top:0;right:2px;font-size:6px}
    .xt .t{position:absolute;bottom:0;left:2px;font-size:6px}
    .th-x{color:var(--v-green)!important;background:rgba(134,178,58,.14)!important}
    .th-y{color:var(--v-good)!important;background:rgba(52,201,106,.20)!important}
    td.y1{background:rgba(52,201,106,.22);color:var(--v-good)!important;font-weight:800}
    td.y0{color:var(--muted)!important}
    .gate{margin-top:8px;display:flex;gap:5px;justify-content:center}
    .gate-chip{border:1px solid;padding:3px 7px;font-size:9px;font-weight:800;letter-spacing:.04em}
    .gate-chip.ok{color:var(--v-good);border-color:var(--v-good);background:rgba(52,201,106,.12);box-shadow:0 0 6px rgba(52,201,106,.35)}
    .gate-chip.warn{color:var(--v-amber);border-color:var(--v-amber);opacity:.5}
    .gate-chip.fail{color:var(--v-fail);border-color:var(--v-fail);opacity:.5}
    .gate-note{margin-top:6px;text-align:center;font-size:7.5px;color:var(--muted)}
    .gate-note b{color:var(--v-good)}
    .viz-tbl td.o-best,.viz-tbl th.o-best{background:rgba(216,154,58,.16);color:var(--v-amber)}
    .viz-tbl tr.o-auc td{background:rgba(52,201,106,.10);color:var(--v-good)}
    .viz-tbl td.o-name{text-align:left;padding-left:3px;color:#C7D0D8}
    .viz-tbl td.st-p{color:var(--v-fail)}.viz-tbl td.st-b{color:var(--v-good);font-weight:800}
    .build{margin-top:8px;display:flex;align-items:center;justify-content:center;gap:3px}
    .b-arr{color:var(--v-amber);font-size:9px;font-weight:800}
    .b-chip{border:1px solid;border-radius:2px;padding:3px 4px;font-size:6.5px;font-weight:800;white-space:nowrap}
    .b-json{color:var(--v-green);border-color:var(--v-green);background:rgba(134,178,58,.10)}
    .b-xgb{color:#fff;border-color:var(--v-store);background:rgba(29,158,117,.35);font-size:8px;padding:3px 6px}
    .b-b64{color:var(--v-store);border-color:var(--v-store);background:rgba(29,158,117,.10);font-size:5.8px}
    .b-py{color:var(--v-good);border-color:var(--v-good);background:rgba(52,201,106,.10)}
    .build-sub{margin-top:4px;text-align:center;font-size:6.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .formula{margin-top:8px;text-align:center;font-size:8.5px;font-weight:800;color:var(--v-amber);letter-spacing:.02em}
    .formula small{display:block;margin-top:4px;font-size:6.5px;font-weight:400;color:var(--muted)}
    .f-legend{margin-top:3px;display:flex;justify-content:center;gap:7px;font-size:6.5px;font-weight:700}

    /* [S6] inspector */
    .inspector-content{overflow:auto;min-height:0}
    .empty-state{padding:14px;color:var(--muted);font-size:10px;line-height:1.55}
    .selected-strip{padding:9px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:38px 1fr;gap:8px;align-items:center}
    .selected-id{color:var(--bg-root);background:var(--amber);font-weight:900;font-size:11px;text-align:center;padding:4px 2px}
    .selected-name{font-size:11px;font-weight:800;line-height:1.2}
    .selected-kind{font-size:9px;color:var(--muted);margin-top:3px}
    .inspect-section{border-bottom:1px solid var(--line);padding:9px}
    .inspect-label{color:var(--amber);font-size:9px;letter-spacing:.09em;margin-bottom:6px}
    .inspect-text{font-size:10px;color:#C9D1D9;line-height:1.5}
    .inspect-list{margin:0;padding:0;list-style:none;display:grid;gap:4px}
    .inspect-list li{font-size:10px;color:#C9D1D9;line-height:1.4}
    .inspect-list li::before{content:'>';color:var(--amber);margin-right:6px}
    .knob-grid{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--line);border-left:1px solid var(--line)}
    .knob{min-width:0;padding:6px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}
    .knob b{display:block;color:var(--muted);font-size:8px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .knob span{display:block;margin-top:3px;color:var(--text);font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .prompt-acc summary{list-style:none;display:flex;align-items:center;gap:6px;color:var(--amber);font-size:9px;letter-spacing:.09em;cursor:pointer;user-select:none}
    .prompt-acc summary::-webkit-details-marker{display:none}
    .prompt-acc summary i{font-style:normal;transition:transform .15s}
    .prompt-acc[open] summary i{transform:rotate(90deg)}
    .prompt-bar{display:flex;justify-content:flex-end;margin:8px 0 6px}
    .prompt-bar button{color:var(--cyan);font-size:10px}
    .prompt-bar button:hover{color:var(--amber)}
    .prompt-pre{margin:0;background:#0A0E13;border:1px solid var(--line);padding:8px;font-size:10px;line-height:1.5;color:#C9D1D9;white-space:pre-wrap;word-break:break-word;max-height:340px;overflow:auto}
    .viz-card{margin-top:2px;background:#0D1117;border:1px solid #46515D;border-left:4px solid var(--accent);padding:13px;overflow:hidden}
    .viz-card .viz-tbl th{height:18px;font-size:10px}
    .viz-card .viz-tbl td{height:16px;font-size:9px}
    .viz-card .viz-label{font-size:10px;margin-top:9px}
    .viz-card .qc-row{font-size:10px;grid-template-columns:74px 1fr 14px}
    .viz-card .gate-chip{font-size:12px;padding:5px 12px}
    .viz-card .gate-note,.viz-card .build-sub{font-size:9.5px}
    .viz-card .b-chip{font-size:9px;padding:5px 7px}
    .viz-card .b-b64{font-size:8px}.viz-card .b-xgb{font-size:11px}
    .viz-card .formula{font-size:12px}.viz-card .formula small{font-size:9px}
    .viz-card .f-legend{font-size:9px;gap:12px}
    .viz-card .xt .x,.viz-card .xt .t{font-size:9px}
    .viz-card .zip-box{width:36px;height:24px;font-size:11px}
    .viz-card .zip-tk{font-size:9px}
    .viz-card .zip-dot{width:5px;height:5px;margin-top:11px}
    .viz-card .zip-ell{margin-top:8px}

    /* [S7] toast + media */
    .toast{position:fixed;bottom:24px;left:50%;transform:translate(-50%,45px);opacity:0;pointer-events:none;border:1px solid var(--amber);background:#0B1016;color:var(--amber);padding:6px 9px;font-size:10px;z-index:60;transition:.16s}
    .toast.show{opacity:1;transform:translate(-50%,0)}
    @media(max-width:1180px){html,body{min-width:900px}.workspace{grid-template-columns:190px minmax(500px,1fr) 240px}.inventory-name{font-size:9px}}
  </style>
</head>
<body>
  <main class="terminal">
    <section class="workspace">
      <aside class="panel inventory">
        <div class="model-switch" id="modelSwitch"></div>
        <div class="inventory-controls" id="filters"></div>
        <div class="module-list" id="moduleList"></div>
      </aside>

      <section class="panel flow-panel">
        <div class="flow-viewport" id="flowViewport">
          <div class="flow-canvas" id="flowCanvas" aria-label="Sealed procedure ladder (read-only)">
          </div>
          <div class="lane-heads" id="laneHeads" aria-hidden="true"></div>
        </div>
      </section>

      <aside class="panel inspector">
        <div class="inspector-content" id="inspectorContent"></div>
      </aside>
    </section>
  </main>
  <div class="toast" id="toast"></div>

  <script>
    'use strict';
    /* ==================================================================
       [J0] MODEL SWITCH - 'xgb' | 'lstm'. Any MODULES/LEARNING field may
       be a shared value OR a {xgb:..., lstm:...} variant object; pick()
       resolves it for the active model. Switching re-renders everything.
       ================================================================== */
    let MODEL='xgb';
    const MODEL_META={
      xgb:{label:'XGBOOST (1H)', noun:'XGBoost', bars:'1h', H:24, embargo:35, oosEnd:'2026-05-29',
           assets:498, pf:'0.57', beats:'64/498', trades:'1'},
      lstm:{label:'LSTM (DAILY)', noun:'LSTM', bars:'1d', H:10, embargo:10, oosEnd:'2026-04-30',
           assets:496, pf:'0.96', beats:'144/496', trades:'28'}};
    function isVariant(v){return !!v&&typeof v==='object'&&!Array.isArray(v)&&('xgb' in v)&&('lstm' in v);}
    function pick(v){return isVariant(v)?v[MODEL]:v;}
    function hasVariants(m){return ['title','kind','short','input','transform','output','invariant','knobs','test'].some(k=>isVariant(m[k]));}
    function MM(){return MODEL_META[MODEL];}

    /* ==================================================================
       [J1] DATA - GROUPS + MODULES (layer contracts, derived from
       docs/PROJECT_STATE.md and the sealed stores; on discrepancy the
       sealed artifacts win). MODULES order = bottom-up flow.
       ================================================================== */
    const GROUPS = [
      {id:'s1', name:'S1 DATA', color:'#55c7a4', subtitle:'Source bars -> committed stores -> per-asset frames -> leakage-safe split (A1-A4)'},
      {id:'s2', name:'S2 SIGNAL+LABEL+X', color:'#FF5C6C', subtitle:'Causal entry signal -> Triple-Barrier Y -> causal features -> per-asset selection (B1-B4)'},
      {id:'s3', name:'S3 TRAINING', color:'#f0ae54', subtitle:'Profit-aligned Optuna HPO -> operating point + Kelly -> frozen artifact (C1-C3)'},
      {id:'s4', name:'S4 OOS+PRODUCT', color:'#ef7898', subtitle:'One-shot OOS verdict -> honest benchmark -> clone-and-show app (D1-D3)'},
      {id:'sg', name:'GUARDS', color:'#54B8FF', subtitle:'Fail-closed gates: split tightness -> pre-OOS asserts -> byte-reproducibility'}
    ];

    const MODULES = [
      {id:"A1", group:"s1", title:"OHLCV acquisition (upstream provenance)", kind:"documented data provenance", viz:"ohlcv",
       short:{xgb:"Alpaca 1h SIP bars 2016->2026, raw prices", lstm:"Alpaca daily bars 2016->2026, raw prices"},
       input:["Alpaca Market Data API (acquired by the upstream source repo - never by this repo)",
              {xgb:"1-hour regular-session bars, full S&P 500 universe, 2016 -> 2026-05-29",
               lstm:"daily bars, full S&P 500 universe (503 symbols), 2016 -> 2026-04-30"}],
       transform:["Document provenance as a block, not as code: this project deliberately performs no network acquisition - reproducibility depends only on frozen stores, never on API availability or keys.",
                  "Keep prices RAW: corporate actions are deferred, so a stock split appears as a price cliff. The engine, the label and the benchmark all read the same raw path - internally consistent, honestly flagged."],
       output:{xgb:"raw 1h OHLCV per ticker in the upstream store (full store ~160 MB, local-only)",
               lstm:"raw daily OHLCV per ticker, 503 symbols, 2016->2026"},
       invariant:["No code in this project opens network connections; no API keys exist in the repo.",
                  "Raw prices only - zero split/dividend adjustment anywhere in the pipeline.",
                  "A data-scope change enters through the upstream store, never through in-flight patches."],
       knobs:[{xgb:"bars=1h regular session", lstm:"bars=1d"}, "prices=raw (actions deferred)", "universe=S&P 500 (503)", "window=2016->2026"],
       test:["grep for http/API clients in the pipeline returns only provenance comments", "the pipeline runs fully offline from the frozen stores"],
       depends:[]},

      {id:"A2", group:"s1", title:"committed bar stores (clone-and-show)", kind:"frozen input stores", viz:"duckdb",
       short:{xgb:"15-ticker 1h demo store committed; full store local", lstm:"full daily store committed (18.5 MB)"},
       input:["raw OHLCV from the upstream acquisition (A1)"],
       transform:[{xgb:"Commit a 5.6 MB DEMO store (bars_demo.duckdb, 15 tickers) so a fresh clone can re-verify sample assets; the full 160 MB 1h store stays local and gitignored - needed only to re-run beyond the demo set.",
                   lstm:"Commit the FULL daily store (sp500_1d.duckdb, 18.5 MB, 503 symbols) - small enough to ship, so every asset is reproducible from a fresh clone."},
                  "Ship the sealed RESULT rows committed next to the stores: the app renders instantly with nothing to train (clone-and-show)."],
       output:{xgb:"xgb/data/bars_demo.duckdb (committed) + xgb/data/liora.duckdb (local, full)",
               lstm:"lstm/data/sp500_1d.duckdb (committed, table bars_1d)"},
       invariant:["Stores are frozen inputs, opened read-only by the pipeline.",
                  "Sealed results + demo data ship committed; hundreds of MB of raw bars do not.",
                  "Column contract exactly: symbol, timestamp, open, high, low, close, volume."],
       knobs:["format=DuckDB", {xgb:"committed=15-ticker demo (5.6 MB)", lstm:"committed=full universe (18.5 MB)"}, "access=read-only"],
       test:["a fresh clone renders the app and re-verifies demo assets without any network", "store re-read is deterministic (equal frames between calls)"],
       depends:["A1"]},

      {id:"A3", group:"s1", title:"canonical per-asset frames", kind:"single read transformation", viz:"frames",
       short:"one loader, one clean OHLCV frame per ticker",
       input:["the committed/local bar store (A2)", "a ticker symbol"],
       transform:["ONE canonical function turns the store into the per-ticker frame every consumer uses - identical frames come from shared code, not from parity assertions between two readers.",
                  "Resolve timezones once, at the source (exchange session time normalized on write); the runtime computes on one clock.",
                  "Emit pure OHLCV columns only - every derived column would be hidden logic outside the pipeline."],
       output:"per-ticker OHLCV frame: timestamp, open, high, low, close, volume - nothing else",
       invariant:["A ticker absent from the store raises an error - never an empty frame.",
                  "Deterministic: repeated loads return equal frames.",
                  "Zero derived values, zero fills, zero row synthesis at read time."],
       knobs:["loader=one shared function", "columns=OHLCV only", "on-missing=hard error"],
       test:["load(ticker) twice -> frames compare equal", "unknown ticker -> RuntimeError"],
       depends:["A2"]},

      {id:"A4", group:"s1", title:"temporal split + purge/embargo", kind:"leakage-safe time split", viz:"split",
       short:{xgb:"warm-up | train ->2023-12-29 | OOS; purge H=24, embargo 35", lstm:"warm-up | train ->2023-12-29 | OOS; purge H=10, embargo 10"},
       input:["the clean per-asset frame (A3)", "frozen split dates from configuration"],
       transform:["Derive boundary indices deterministically from frozen dates: warm-up 2016 -> 2016-10-14, Train 2016-10-17 -> 2023-12-29, OOS 2024-01-02 -> end of data.",
                  {xgb:"Purge: drop from Train every setup whose label window [t0, t0+H] crosses the Train boundary (purge = H = 24 hourly bars); embargo = 35 bars past the boundary (>= the max feature lookback).",
                   lstm:"Purge: drop from Train every setup whose label window [t0, t0+H] crosses the Train boundary (purge = H = 10 sessions); embargo = 10 sessions past the boundary."},
                  "Splits are MARKS over one continuous frame - the data file is never physically cut."],
       output:"partition marks (warm-up / train / purge / embargo / OOS) over the frame",
       invariant:["Purge and embargo are always > 0 - never simplify to warm-up -> train -> OOS.",
                  "The OOS window is frozen: fixed once, untouchable until the verdict step (D1).",
                  "All boundaries count bars on the index, never wall-clock time."],
       knobs:["train_end=2023-12-29", "oos_start=2024-01-02", {xgb:"purge=H=24 · embargo=35 bars", lstm:"purge=H=10 · embargo=10 sessions"}],
       test:["same inputs -> identical boundary indices (strict determinism)", "no Train label window reaches past the boundary (asserted)"],
       depends:["A3"]},

      {id:"G.1", group:"sg", title:"split leakage guard", kind:"fail-closed split gate", viz:"guard",
       short:"partitions ordered, purge >= H, embargo >= max lookback, OOS frozen",
       input:["partition marks from A4", "label horizon H and max feature lookback from the S2 contracts"],
       transform:["Assert the 5 partitions exist in strict order on one continuous index, non-overlapping, warm-up covering the feature roll-in.",
                  "Assert purge >= the maximum label horizon and embargo >= the maximum rolling feature lookback; recompute all boundaries from frozen config and compare bit-exact.",
                  "Any mismatch on the OOS boundary is a frozen-OOS violation - the run stops."],
       output:"one fail-closed verdict; FAIL blocks all of S2+ for the asset",
       invariant:["The guard only reads marks - it never moves a boundary, never touches data.",
                  "There is no WARN tier: any failed predicate rejects the split."],
       knobs:["partitions=5 ordered", {xgb:"purge_min=24 · embargo_min=35", lstm:"purge_min=10 · embargo_min=10"}, "boundary_source=frozen config"],
       test:["shrink purge to 0 in a fixture -> guard FAILs", "shift oos_start by one bar vs config -> recompute mismatch FAILs"],
       depends:["A4"]},

      {id:"B1", group:"s2", title:"momentum side + causal entry gate", kind:"trade-candidate generator", viz:"signal",
       short:"side = sign(log_return_5) behind |lr5| >= 0.15 x rv20; fill at next open",
       input:["Train-window bars + marks (A4, G.1 PASS)"],
       transform:["Primary side signal: direction = sign(log_return_5) at the decision bar t0 - a deliberately simple, fully causal momentum rule (the model's job is to judge the trade, not to invent it: meta-labeling).",
                  "Causal significance gate: keep a candidate only when |log_return_5| >= 0.15 x realized_volatility_20, both computed from data <= close[t0] - noise-level moves never become candidates.",
                  "Entry fills at the NEXT bar's open (t0+1) - the decision never trades on information from its own bar."],
       output:"trade candidates: (t0, direction, entry = open[t0+1])",
       invariant:["Every gate input uses data at or before close[t0]; the only next-bar references are the legitimate entry/exit fills.",
                  "The gate constants are fixed global values - never tuned per asset, never tuned on OOS."],
       knobs:["side=sign(log_return_5)", "gate=|lr5| >= 0.15 x rv20", "fill=next bar open"],
       test:["shifting any feature forward by one bar changes candidates (causality probe)", "gate disabled reproduces the every-bar candidate set"],
       depends:["A4","G.1"]},

      {id:"B2", group:"s2", title:"asymmetric Triple-Barrier label", kind:"outcome labeling (meta-label)", viz:"tb",
       short:{xgb:"TP 2xATR14 / SL 1xATR14, time barrier H=24; Y = net>0", lstm:"TP 2xATR14 / SL 1xATR14, time barrier H=10; Y = net>0"},
       input:["trade candidates (B1)", "bars for the label window [t0, t0+H]"],
       transform:["Three barriers per candidate: take-profit at 2 x ATR(14), stop-loss at 1 x ATR(14) (reward:risk b = 2), and a time barrier at H bars - first touch decides the exit.",
                  "Simulate the trade net of costs: 1 bp commission + 2 bp slippage per side, entry open[t0+1], exit at the touched barrier.",
                  "Y = 1 if net P&L > 0, else 0 - the label answers exactly the question the strategy will ask."],
       output:"labeled events: (t0, direction, Y, exit info) - the future is used ONLY inside the label lane",
       invariant:["Label inputs beyond t0 exist only within [t0, t0+H] - the purge in A4 guarantees no Train label reads OOS data.",
                  "Barrier geometry is a fixed global contract - never searched, never tuned per asset.",
                  "Costs are part of the label, not an afterthought: Y already encodes them."],
       knobs:["TP=2xATR(14)", "SL=1xATR(14)", {xgb:"H=24 bars (1h)", lstm:"H=10 sessions (1d)"}, "costs=1bp+2bp per side"],
       test:["b = TP/SL = 2 verified in the event stream", "recomputing labels reproduces Y bit-identically"],
       depends:["B1"]},

      {id:"B3", group:"s2", title:"causal features X", kind:"feature engineering (leak-free)", viz:"featmx",
       short:{xgb:"namespaced multi-timeframe X (1h/1d/1w), merge_asof backward", lstm:"60-session window of causal daily features"},
       input:["bars + candidates (B1)", "feature registry / catalog"],
       transform:[{xgb:"Namespaced multi-timeframe features: 1h base plus 1d/1w context joined by CLOSE-TIME availability (merge_asof backward) - an in-progress daily or weekly bar can never leak into an intraday decision.",
                   lstm:"A 60-session window of causal daily features feeds the recurrent model - each feature at session t uses data <= close[t]."},
                  "Fold-causal normalization: every CV fold's scaling statistics come only from rows before that fold's embargo boundary; the OOS window uses statistics frozen on the full Train set.",
                  "Audit columns (diagnostics) live outside X - they never enter the model matrix."],
       output:"X matrix at close[t0] in a frozen manifest order + Y from B2",
       invariant:["Every X value uses data at or before close[t0].",
                  "A mandatory feature that cannot be computed excludes the row - values are never imputed.",
                  "The feature manifest is frozen per run; changing it changes the lineage."],
       knobs:[{xgb:"timeframes=1h+1d+1w (merge_asof backward)", lstm:"window=60 sessions"}, "scaling=fold-causal", "on-missing=exclude row"],
       test:["shifting the 1d/1w context forward by one bar changes X (causality probe)", "OOS X uses frozen Train statistics (asserted)"],
       depends:["B1","B2"]},

      {id:"B4", group:"s2", title:"per-asset forward feature search (Train-only)", kind:"feature selection loop", viz:"loop",
       short:{xgb:"committed per-asset overrides feed the runs", lstm:"forward selection behind a 2-seed anti-overfit gate"},
       input:["X/Y events (B2, B3) - Train window only", "candidate feature pool (core + optional + DSL proposals)"],
       transform:[{xgb:"Per-asset feature subsets come from COMMITTED overrides produced by the parent project's search; the v2 branch did not port the live worker - stated honestly rather than half-ported.",
                   lstm:"Forward selection: add a candidate feature only if it improves Train-CV score beyond a minimum gain; a language-model agent may PROPOSE new features, but only through a safe causal DSL - proposals compile to causal transforms or are rejected."},
                  {xgb:"Any future re-search must obey the same Train-only + fail-closed contract as the LSTM loop.",
                   lstm:"2-SEED gate: single-seed evaluation noise (~0.019 AUC-PR) exceeded the acceptance threshold (min_gain 0.008), so candidate gains are averaged over two model initializations before acceptance - otherwise the loop would accept noise."},
                  "Every accepted subset is a Train-only output of one uniform procedure - not hand-tuning, not OOS-derived."],
       output:"per-asset feature override list (subset of the pool), committed with the run lineage",
       invariant:["The search reads Train folds only; a fail-closed assert stops any OOS read.",
                  "Selection metric lives on the Train side (CV score / OOF log-growth) - never an OOS value.",
                  "Feature proposals enter only through the causal DSL - free-form code is rejected."],
       knobs:[{xgb:"source=committed overrides", lstm:"gate=min_gain 0.008 · seeds=2 (noise ~0.019)"}, "scope=Train only", "proposals=causal DSL only"],
       test:["the search process crashes (fail-closed) if pointed at an OOS row", "re-running selection with the same seed set reproduces the subset"],
       depends:["B2","B3"]},

      {id:"G.2", group:"sg", title:"pre-OOS fail-closed asserts", kind:"anti-leakage gate (training side)", viz:"guard",
       short:"HPO / calibration / search crash on any OOS read; audited",
       input:["every S2/S3 consumer of events (HPO, calibration, feature search)"],
       transform:["Each training-side component carries a hard assert: every event it consumes must satisfy t0 + H + embargo <= oos_start - reading an OOS row raises, it never degrades to a warning.",
                  "An adversarial audit (independent reviewers trying to REFUTE the claim) checked feature causality, gate causality, barrier windows, CV integrity and OOS read-once - verdict: clean."],
       output:"a run that can only complete if no training-side component ever saw OOS data",
       invariant:["Fail-closed beats fail-soft: a leak crashes the run instead of biasing the result.",
                  "The audit is adversarial, not confirmatory - reviewers are prompted to refute."],
       knobs:["assert=t0+H+embargo <= oos_start", "scope=HPO + operating point + feature search", "audit=adversarial, independent"],
       test:["feeding one OOS event to the HPO raises immediately", "audit transcript: every leak hypothesis refuted"],
       depends:["A4","B4"]},

      {id:"C1", group:"s3", title:"Optuna HPO - objective: AUC-PR -> Train-OOF log-growth", kind:"profit-aligned hyper-parameter search", viz:"optuna",
       short:{xgb:"tunes XGB params (+reg_alpha, gamma) for OOF trading log-growth", lstm:"tunes LSTM params (+weight_decay, num_layers) for OOF trading log-growth"},
       input:["X/Y events + folds (S2, G.2 armed)", "hyper-parameter search space (registry-driven)"],
       transform:["THE course correction of this project: the config optimized AUC-PR while the strategy was judged on profit - a self-documented objective mismatch. The objective became the mean Train OUT-OF-FOLD trading LOG-GROWTH: each trial's fold model predicts out-of-fold, the trade engine replays those predictions over a coarse operating grid, and the trial scores sum(log(1+r)) - the Kelly-optimal geometric criterion.",
                  {xgb:"Search space: max_depth, eta, subsample, colsample_bytree, min_child_weight, reg_lambda, n_estimators + reg_alpha and gamma - which the old trainer accepted but silently IGNORED (found and fixed: params are now forwarded).",
                   lstm:"Search space: hidden size, learning rate, dropout + weight_decay and num_layers added for regularization - reducing the Train->OOS gap."},
                  "Purged walk-forward CV inside Train: no validation fold ever precedes its training fold; a purge sits between folds; deterministic sampler (fixed seed)."],
       output:"best hyper-parameters per asset + Train-CV score, persisted with lineage",
       invariant:["Optimization strictly inside Train; the OOS is never read (G.2 assert).",
                  "The label geometry (Triple-Barrier) is never a search dimension.",
                  "Same seed -> identical trial sequence (deterministic HPO)."],
       knobs:["objective=mean Train-OOF log-growth", "cv=purged walk-forward", {xgb:"space=7+2 XGB params (reg_alpha, gamma now forwarded)", lstm:"space=hidden/lr/dropout + weight_decay/num_layers"}, "sampler=TPE(seed fixed)"],
       test:["re-running HPO reproduces best params exactly (pinned env, seeded)", "objective replays through the SAME trade engine used at the verdict"],
       depends:["B3","B4","G.2"]},

      {id:"C2", group:"s3", title:"operating point + generalized Kelly", kind:"decision-layer calibration", viz:"kelly",
       short:{xgb:"lambda calibrated on Train OOF; theta PINNED at 0.60", lstm:"theta, lambda and direction calibrated jointly on Train OOF"},
       input:["OOF predictions from the tuned model (C1)", "the trade engine + barrier geometry (b = TP/SL = 2)"],
       transform:["Position size: generalized fractional Kelly f = clip( lambda x (p - (1-p)/b), 0, cap ) where b is the barrier reward:risk. At b=1 this reduces EXACTLY to the classical lambda x (2p-1) - proven by byte-identical replay of the old results.",
                  {xgb:"Entry threshold theta is PINNED at 0.60: per-asset theta calibration was tried and OVERFIT the operating point (a flagship asset's OOS profit factor collapsed 1.89 -> 0.99 in the dev read) - the machinery stays, config-driven, but the knob is frozen.",
                   lstm:"Theta, lambda and trade direction are calibrated JOINTLY on Train out-of-fold log-growth - the daily pipeline earns its per-asset operating point because its calibration validated cleanly."},
                  "All calibration inputs are Train OOF - the same G.2 assert guards this layer."],
       output:"per-asset operating point (theta, lambda, direction) sealed into the strategy artifact",
       invariant:["Sizing touches money management only - the model bytes are independent of lambda.",
                  "Not every knob deserves tuning: a calibrated parameter must beat its pinned default out of fold, or it stays pinned.",
                  "cap bounds f: one trade can never bet more than the configured fraction."],
       knobs:["f=clip(lambda(p-(1-p)/b),0,cap)", "b=TP/SL=2", {xgb:"theta=0.60 pinned", lstm:"theta,lambda,direction=joint Train-OOF grid"}],
       test:["b=1 replay is byte-identical to the legacy lambda(2p-1) rows", "calibration crashes if offered an OOS row (G.2)"],
       depends:["C1"]},

      {id:"C3", group:"s3", title:"frozen strategy artifact", kind:"deterministic model freeze", viz:"build",
       short:{xgb:"full-Train refit -> base64 booster + hash, embedded", lstm:"full-Train refit -> torch weights, seeded + deterministic"},
       input:["best params (C1) + operating point (C2)", "full Train window"],
       transform:["Refit the champion configuration on the full Train window and freeze it: the artifact carries the model bytes, the operating point, the feature manifest and content hashes - a self-check validates the artifact against golden vectors on load.",
                  {xgb:"Determinism: single-threaded training (XGBOOST_N_JOBS=1), fixed seed - the booster serializes to base64 and embeds in the strategy file.",
                   lstm:"Determinism: torch pinned to 2 threads with deterministic algorithms, seed_everything - the weights serialize with the run lineage."}],
       output:"one frozen, hash-bound strategy artifact per asset",
       invariant:["The artifact is immutable: any edit breaks its hash and the self-check refuses it.",
                  "Nothing trains after the freeze - the OOS verdict and the app only READ artifacts.",
                  "Determinism is part of the contract, not an optimization."],
       knobs:[{xgb:"threads=1 (XGBOOST_N_JOBS)", lstm:"torch_threads=2 deterministic"}, "seed=fixed", "selfcheck=golden vectors + hash"],
       test:["retraining with the same lineage reproduces the artifact bytes", "a flipped byte in the artifact fails the load self-check"],
       depends:["C2"]},

      {id:"D1", group:"s4", title:"one-shot OOS verdict -> sealed store", kind:"single-read out-of-sample evaluation", viz:"oos",
       short:{xgb:"498 assets sealed; median PF 0.57 - an honest negative", lstm:"496 assets sealed; median PF 0.96 - a wash vs baseline"},
       input:["frozen artifact (C3)", "the untouched OOS window (A4)"],
       transform:["Generate and score the OOS window EXACTLY ONCE per asset, at the verdict step - the number reported is exactly what you would have gotten standing on the first OOS day with only prior data.",
                  {xgb:"Full-universe verdict (498 assets, window -> 2026-05-29): the v2 levers made things WORSE than the prior baseline - median profit factor 0.87 -> 0.57; under the harder 2:1 barrier ~2/3 of assets never clear the pinned threshold and abstain into holding (median 1 trade).",
                   lstm:"Full-universe verdict (496 assets, window -> 2026-04-30): v2 is a wash vs baseline (median profit factor ~0.98 -> 0.96, median 28 trades) - no edge demonstrated, methodology intact."},
                  "Seal every per-asset row (capital path, profit factor, drawdown, win rate, trades, Train-CV score, window) into oos_metrics.db - the single source the product reads."],
       output:{xgb:"xgb/data/oos_metrics.db - 498 sealed rows, read-only downstream",
               lstm:"lstm/oos_metrics.db - 496 sealed rows, read-only downstream"},
       invariant:["No OOS value ever feeds back into any decision - enforced upstream (G.2) and by process: the window is read once.",
                  "Negative results are committed with the same ceremony as positive ones.",
                  "A small development sample flattered these levers; only the full universe read once is the honest test."],
       knobs:["reads_per_asset=1", {xgb:"universe=498 · oos_end=2026-05-29", lstm:"universe=496 · oos_end=2026-04-30"}, "store=oos_metrics.db (sealed)"],
       test:["make verify re-runs sample assets and reproduces sealed rows byte-identically", "the store's row count and window match the frozen config"],
       depends:["C3","G.2"]},

      {id:"D2", group:"s4", title:"honest benchmark feed (buy & hold)", kind:"transparent baseline", viz:"hodl",
       short:{xgb:"model beats its own buy & hold on 64/498 assets", lstm:"model beats its own buy & hold on 144/496 assets"},
       input:["sealed OOS rows (D1)", "the committed daily bar store (A2)"],
       transform:["Compute each ticker's buy-and-hold return over the SAME OOS window (first open -> last close) from the committed store and seal it into the dashboard feed next to the model's result.",
                  "Show the comparison ON the result page, not in a footnote: in the strong 2024->2026 bull window most per-asset strategies do NOT beat simply holding the same stock.",
                  "Lesson embedded here: after a re-seal this feed silently carried the benchmark for 0 assets - the default view lost its baseline until a gate (coverage == universe) was added."],
       output:"dashboard feed with hodl_return_pct + beats_hodl per asset (full coverage, gated)",
       invariant:["Benchmark and strategy read the same raw-price store - internally consistent (split cliffs affect both).",
                  "The benchmark is per-asset and same-window - never an index proxy from a different data plane.",
                  "Feed coverage is asserted: benchmark present for every sealed asset or the seal fails."],
       knobs:["hodl=first open -> last close over OOS", {xgb:"beats=64/498", lstm:"beats=144/496"}, "coverage_gate=universe complete"],
       test:["beats_hodl == (return_pct > hodl_return_pct) for every row", "coverage equals the sealed universe count"],
       depends:["D1","A2"]},

      {id:"D3", group:"s4", title:"clone-and-show product (unified app)", kind:"read-only presentation layer", viz:"folder",
       short:"sealed stores + feeds render instantly; a METHODS registry entry per model",
       input:["sealed stores (D1) + benchmark feeds (D2) for BOTH models"],
       transform:["The application is a VIEWER: pick a model (XGBoost / LSTM), pick a basket of tickers, read the sealed OOS outcome against the same basket's buy & hold - nothing trains, trades or optimizes at runtime.",
                  "Adding a model = one registry entry (its sealed store + its feed + a description); everything else is method-generic.",
                  "Preset packages select tickers by a rule whose inputs are all knowable BEFORE the OOS window (Train-CV score, pre-OOS risk stats, static sectors) - ranking sealed results by anything dated inside the window would be look-ahead selection."],
       output:"the unified Streamlit application (Basket Simulator + report pages), rendering from committed artifacts on a fresh clone",
       invariant:["Read-only over sealed artifacts - the app can display results, never create them.",
                  "Evidence tiers stay separated: sealed numbers never share a table with exploratory numbers.",
                  "Every displayed comparison carries its honest benchmark."],
       knobs:["registry=1 entry per model", "runtime=read-only", "preset_inputs=pre-OOS only"],
       test:["a fresh clone renders both models' results without training", "automated gates walk every page and the full simulator flow"],
       depends:["D1","D2"]},

      {id:"G.3", group:"sg", title:"byte-reproducibility acceptance", kind:"determinism gate (product side)", viz:"guard",
       short:"re-run == sealed rows, byte-identical - or the claim is void",
       input:["sealed stores (D1)", "committed demo/full bar stores (A2)", "frozen artifacts + lineage (C3)"],
       transform:["Acceptance = reproduction: re-run sample assets end-to-end from the committed data and compare the produced rows against the sealed store - they must match BYTE-identically, not approximately.",
                  "Determinism is what turns 'trust our numbers' into 'check our numbers' - the gate runs on a fresh clone with no network."],
       output:"a pass/fail reproduction verdict per sample asset (the repo's standing acceptance test)",
       invariant:["Approximate reproduction is failure: a single differing byte fails the gate.",
                  "The gate uses only committed inputs - reproducibility cannot depend on local state."],
       knobs:[{xgb:"samples=demo tickers from the committed mini store", lstm:"samples=a diverse manifest sample"}, "comparison=byte-identical rows"],
       test:["the reproduction gate passes on a fresh clone", "corrupting one committed input makes the gate fail loudly"],
       depends:["D1"]},
    ];

      folder:{h:122,render:()=>svgV(54,`
        <path d="M10,10 v-4 a2,2 0 0 1 2,-2 h34 l6,6" fill="rgba(52,201,106,.10)" stroke="${PAL.good}" stroke-width="1.1"/>
        <rect x="10" y="10" width="148" height="40" rx="3" fill="rgba(52,201,106,.05)" stroke="${PAL.good}" stroke-width="1.1"/>
        ${[PAL.store,PAL.store,PAL.blue,PAL.blue,PAL.amber,PAL.good,PAL.pink].map((c,i)=>{
          const x=18+i*19;
          return `<path d="M${x},16 h10 l5,5 v21 h-15 z" fill="${c}22" stroke="${c}" stroke-width="1"/><path d="M${x+10},16 v5 h5" fill="none" stroke="${c}" stroke-width="1"/>`;
        }).join('')}`)+
        `<div class="f-legend"><span style="color:${PAL.store}">stores x2</span><span style="color:${PAL.blue}">feeds x2</span><span style="color:${PAL.amber}">registry</span><span style="color:${PAL.good}">app</span><span style="color:${PAL.pink}">gates</span></div>
        <div class="viz-label">clone-and-show · read-only · renders instantly</div>`}
    };
    function vizCard(m){const v=VIZ[m.viz];return v?v.render(m):'';}

    /* ==================================================================
       [J3] LAYOUT - bottom-up ladder from persisted ORDER (the only
       position source), lane (x) = group; canvas size DERIVED.
       ================================================================== */
    const BLOCK_W=184, LANE_W=230, GAP=36, MARGIN_X=23, TOP_PAD=70, BOTTOM_PAD=50;
    const LANE_X={};GROUPS.forEach((g,i)=>LANE_X[g.id]=MARGIN_X+i*LANE_W);
    const DIVX=GROUPS.slice(0,-1).map((g,i)=>Math.round((MARGIN_X+i*LANE_W+BLOCK_W+MARGIN_X+(i+1)*LANE_W)/2));
    const CANVAS_W=MARGIN_X*2+(GROUPS.length-1)*LANE_W+BLOCK_W;
    const CANVAS_H=TOP_PAD+BOTTOM_PAD+MODULES.reduce((a,m)=>a+VIZ[m.viz].h+GAP,0)-GAP;
    function layoutFor(order){const pos={};let y=CANVAS_H-BOTTOM_PAD;
      order.forEach(id=>{const m=mod(id);if(!m)return;y-=VIZ[m.viz].h;pos[id]={x:LANE_X[m.group],y};y-=GAP;});return pos;}

    /* ==================================================================
       [J4] STATE - SEALED: the ladder order is the MODULES declaration
       order, constant. No localStorage, no persistence, no hidden state.
       ================================================================== */
    const ORDER=MODULES.map(m=>m.id);
    const $=q=>document.querySelector(q);
    let selectedId=null, inventoryFilter='all';

    function safe(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));}
    function group(id){return GROUPS.find(g=>g.id===id)}
    function mod(id){return MODULES.find(m=>m.id===id)}
    function blockH(id){const m=mod(id);return m?VIZ[m.viz].h:54}
    function color(m){return group(m.group).color}

    /* ==================================================================
       [J6] CANVAS - bricks, sticky lane heads, pan / zoom (read-only)
       ================================================================== */
    let zoom=1,panX=0,panY=0,panning=null,panMoved=false;

    function depsOf(id){const m=mod(id);return m&&m.depends?m.depends.slice():[];}
    function dependentsOf(id){return MODULES.filter(m=>(m.depends||[]).includes(id)).map(m=>m.id);}
    function applyTransform(){const c=$('#flowCanvas');if(c)c.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;const v=$('#flowViewport');if(v){const s=20*zoom;v.style.backgroundSize=s+'px '+s+'px';v.style.backgroundPosition=panX+'px '+panY+'px';}syncLaneHeads();}
    function contentBox(){const pos=layoutFor(ORDER);let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
      MODULES.forEach(m=>{const p=pos[m.id];x0=Math.min(x0,p.x);y0=Math.min(y0,p.y);x1=Math.max(x1,p.x+BLOCK_W);y1=Math.max(y1,p.y+blockH(m.id));});
      return {x:x0-40,y:y0-70,w:x1-x0+80,h:y1-y0+120};}
    function fitView(){const vp=$('#flowViewport');if(!vp)return;const vw=vp.clientWidth||1000,vh=vp.clientHeight||700;const b=contentBox();
      zoom=Math.max(0.15,Math.min((vw-24)/b.w,(vh-24)/b.h,1.15));panX=Math.round((vw-b.w*zoom)/2-b.x*zoom);panY=Math.round((vh-b.h*zoom)/2-b.y*zoom);applyTransform();}

    function lego(m,p){
      const g=group(m.group);
      const el=document.createElement('article');
      el.className=`lego ${selectedId===m.id?'selected':''}`;
      el.dataset.id=m.id;
      el.style.setProperty('--accent',g.color);el.style.left=p.x+'px';el.style.top=p.y+'px';el.style.height=blockH(m.id)+'px';
      el.innerHTML=`<div class="studs"><i class="stud"></i><i class="stud"></i><i class="stud"></i><i class="stud"></i></div>`+
        `<div class="lego-top"><span class="lego-id">${m.id}</span><span class="lego-title">${safe(pick(m.title))}</span>${hasVariants(m)?`<span class="lego-variant" title="model-specific block">[${MM().bars}]</span>`:''}</div>${vizCard(m)}`;
      el.addEventListener('click',e=>{e.stopPropagation();select(m.id)});
      return el;
    }
    function renderLaneHeads(){const c=$('#laneHeads');if(!c)return;
      c.innerHTML=GROUPS.map(g=>`<div class="lane-head" data-group="${g.id}" style="color:${g.color}">${safe(g.name)}</div>`).join('');syncLaneHeads();}
    function syncLaneHeads(){const c=$('#laneHeads');if(!c)return;
      c.querySelectorAll('.lane-head').forEach(el=>{
        el.style.left=(panX+zoom*LANE_X[el.dataset.group])+'px';
        el.style.width=Math.max(24,zoom*BLOCK_W)+'px';});
      const sw=Math.max(1,1/zoom)+'px';
      document.querySelectorAll('#flowCanvas .lane-sep').forEach(d=>d.style.width=sw);}
    function renderLaneSeps(){const c=$('#flowCanvas');
      DIVX.forEach(x=>{const d=document.createElement('div');d.className='lane-sep';d.style.left=x+'px';c.appendChild(d);});}
    function renderCanvas(){
      const canvas=$('#flowCanvas'); canvas.querySelectorAll('.lego').forEach(n=>n.remove());
      const pos=layoutFor(ORDER);
      ORDER.forEach(id=>{const m=mod(id);if(m)canvas.appendChild(lego(m,pos[id]));});
    }
    function select(id){selectedId=id;renderInventory();renderCanvas();renderInspector(mod(id));}
    function clearSelect(){selectedId=null;renderInventory();renderCanvas();renderInspector(null);}

    $('#flowCanvas').addEventListener('click',e=>{if(e.target===$('#flowCanvas')){if(panMoved){panMoved=false;return;}clearSelect();}});
    $('#flowViewport').addEventListener('wheel',e=>{e.preventDefault();const vp=$('#flowViewport').getBoundingClientRect();const mx=e.clientX-vp.left,my=e.clientY-vp.top;const f=e.deltaY<0?1.12:1/1.12;const nz=Math.max(0.15,Math.min(3,zoom*f));const cx=(mx-panX)/zoom,cy=(my-panY)/zoom;panX=mx-cx*nz;panY=my-cy*nz;zoom=nz;applyTransform();},{passive:false});
    $('#flowCanvas').addEventListener('pointerdown',e=>{if(e.button!==0)return;if(e.target!==$('#flowCanvas'))return;panning={sx:e.clientX,sy:e.clientY,px:panX,py:panY};panMoved=false;$('#flowCanvas').classList.add('panning');});
    $('#flowCanvas').addEventListener('dblclick',e=>{if(e.target===$('#flowCanvas'))fitView();});
    document.addEventListener('pointermove',e=>{if(!panning)return;panX=panning.px+(e.clientX-panning.sx);panY=panning.py+(e.clientY-panning.sy);if(Math.abs(e.clientX-panning.sx)+Math.abs(e.clientY-panning.sy)>3)panMoved=true;applyTransform();});
    document.addEventListener('pointerup',()=>{if(panning){panning=null;$('#flowCanvas').classList.remove('panning');}});

    /* ==================================================================
       [J7] INVENTORY + INSPECTOR - side panels, learning accordion
       ================================================================== */
    function renderModelSwitch(){
      $('#modelSwitch').innerHTML=['xgb','lstm'].map(k=>
        `<button class="model-btn ${MODEL===k?'active':''}" data-model="${k}">${MODEL_META[k].label}</button>`).join('');
      document.querySelectorAll('.model-btn').forEach(b=>b.onclick=()=>{
        if(MODEL===b.dataset.model)return;
        MODEL=b.dataset.model;
        renderModelSwitch();renderInventory();renderCanvas();
        renderInspector(selectedId?mod(selectedId):null);
        toast('MODEL: '+MODEL_META[MODEL].noun);
      });
    }
    function renderFilters(){
      const opts=[['all','ALL'],...GROUPS.map(g=>[g.id,g.name])];
      $('#filters').innerHTML=opts.map(([id,label])=>`<button class="filter ${inventoryFilter===id?'active':''}" data-filter="${id}">${label}</button>`).join('');
      document.querySelectorAll('.filter').forEach(b=>b.onclick=()=>{inventoryFilter=b.dataset.filter;renderFilters();renderInventory();});
    }
    function renderInventory(){
      const list=$('#moduleList'); let html='';
      GROUPS.filter(g=>inventoryFilter==='all'||inventoryFilter===g.id).forEach(g=>{
        const items=MODULES.filter(m=>m.group===g.id);
        html+=`<div class="inventory-group" style="color:${g.color}">${g.name}</div>`;
        html+=items.map(m=>`<div class="inventory-row ${selectedId===m.id?'selected':''}" data-id="${m.id}" style="--accent:${g.color}"><span class="inventory-id">${m.id}</span><span class="inventory-name">${safe(pick(m.title))}</span></div>`).join('');
      });
      list.innerHTML=html;
      list.querySelectorAll('.inventory-row').forEach(row=>{
        row.addEventListener('click',()=>select(row.dataset.id));
      });
    }
    function parseKnob(v){const [a,...b]=v.split('=');return {key:a,value:b.join('=')||'required'}}
    function items(v){const r=pick(v);return (Array.isArray(r)?r:[r]).map(x=>pick(x));}
    function renderInspector(m){
      if(!m){$('#inspectorContent').innerHTML='<div class="empty-state">Click a brick or pick it from the inventory.<br><br>The canvas shows each layer\'s id, name and mini-visualization; the switch above the inventory flips the XGBoost / LSTM view of model-specific blocks.<br><br>The inspector shows the procedure contract - input, transform, output, invariants, knobs - and the LEARNING accordion: how we thought and what we learned building this block.</div>';return;}
      const c=color(m);
      const prevAcc=$('#inspectorContent .prompt-acc');
      const accOpen=!!(prevAcc&&prevAcc.open);
      const preScroll=accOpen?(($('#inspectorContent .prompt-pre')||{}).scrollTop||0):0;
      $('#inspectorContent').innerHTML=`
        <div class="selected-strip"><div class="selected-id" style="background:${c}">${m.id}</div><div><div class="selected-name">${safe(pick(m.title))}</div><div class="selected-kind">${safe(pick(m.kind))} - ${safe(pick(m.short))}${hasVariants(m)?` · <span style="color:var(--amber)">${MM().noun} view</span>`:''}</div></div></div>
        <section class="inspect-section"><div class="inspect-label">INPUT</div><ul class="inspect-list">${items(m.input).map(x=>`<li>${safe(x)}</li>`).join('')}</ul></section>
        <section class="inspect-section"><div class="inspect-label">TRANSFORM</div><ul class="inspect-list">${items(m.transform).map(x=>`<li>${safe(x)}</li>`).join('')}</ul></section>
        <section class="inspect-section"><div class="inspect-label">OUTPUT</div><div class="inspect-text">${safe(pick(m.output))}</div></section>
        <section class="inspect-section"><div class="inspect-label">INVARIANTS</div><ul class="inspect-list">${items(m.invariant).map(x=>`<li>${safe(x)}</li>`).join('')}</ul></section>
        <section class="inspect-section"><div class="inspect-label">LOW-CODE KNOBS</div><div class="knob-grid">${items(m.knobs).map(x=>{const k=parseKnob(x);return `<div class="knob"><b>${safe(k.key)}</b><span>${safe(k.value)}</span></div>`}).join('')}</div></section>
        <section class="inspect-section"><div class="inspect-label">VISUALIZATION</div><div class="viz-card" style="--accent:${c}">${vizCard(m)}</div></section>
        <section class="inspect-section"><details class="prompt-acc"${accOpen?' open':''}><summary><i>&#9656;</i> HOW WE THOUGHT &middot; WHAT WE LEARNED</summary><div class="prompt-bar"><button id="copyReplica">COPY AS PROMPT</button></div><pre class="prompt-pre">${safe(learningPrompt(m))}</pre></details></section>`;
      if(accOpen){const pp=$('#inspectorContent .prompt-pre');if(pp)pp.scrollTop=preScroll;}
      $('#copyReplica').onclick=()=>copyText(learningPrompt(m));
    }
    /* learning prompt: the CONTEXT section is computed statically from
       MODULES[].depends, so it always describes the declared surrounding
       logic; the narrative comes from LEARNING[id] - see [J1b] */
    function learningPrompt(m){
      const P=LEARNING[m.id]||{};
      const up=depsOf(m.id).map(d=>{const dm=mod(d);return dm?`upstream: ${d} "${pick(dm.title)}" -> provides: ${pick(dm.output)}`:`upstream: ${d}`;});
      const down=dependentsOf(m.id).map(d=>{const dm=mod(d);return dm?`downstream: ${pick(m.output)} -> consumed by: ${d} "${pick(dm.title)}"`:`downstream: ${d}`;});
      const ctx=[...(up.length?up:['upstream: none - first block of the flow']),
                 ...(down.length?down:['downstream: none - last block of the flow']),
                 `active model view: ${MM().noun} (${MM().bars} bars) - the sibling model shares this procedure with the knobs listed`];
      const arr=v=>(v?(Array.isArray(v)?v:[v]).map(x=>pick(x)):[]);
      const sec=(h,list)=>`\n\n${h}\n`+list.map(x=>'- '+x).join('\n');
      return `=== ${m.id} · ${pick(m.title)} - LEARNING-BY-DOING RECORD (${MM().noun}) ===`+
        sec('GOAL',[pick(P.goal)||pick(m.kind)])+
        sec('PIPELINE CONTEXT (surrounding logic)',ctx)+
        sec('HOW WE THOUGHT (decisions + why)',arr(P.decisions))+
        sec('WHAT WE LEARNED (paid-for lessons)',arr(P.lessons))+
        sec('INVARIANTS (non-negotiable)',items(m.invariant))+
        sec('KNOBS (low-code parameters)',items(m.knobs))+
        sec('ACCEPTANCE TESTS',items(m.test))+
        sec('IMPLEMENTATION PRINCIPLES',[...arr(P.principles),...PROMPT_FOOTER]);
    }
    function toast(msg){const el=$('#toast');el.textContent=msg;el.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove('show'),1500)}
    async function copyText(t){try{await navigator.clipboard.writeText(t);toast('COPIED');}catch(e){toast('CLIPBOARD UNAVAILABLE');}}

    /* ==================================================================
       [J8] BOOT
       ================================================================== */
    (function sizeCanvas(){const fc=$('#flowCanvas');if(fc){fc.style.width=CANVAS_W+'px';fc.style.height=CANVAS_H+'px';}})();
    renderLaneSeps();renderLaneHeads();
    renderModelSwitch();renderFilters();renderInventory();renderCanvas();renderInspector(null);
    fitView();
  </script>
</body>
</html>
