<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard — per-asset OOS results</title>
<style>
  body{ margin:0; background:#0e1116; color:#e6edf3;
        font:15px/1.6 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
  header{ padding:22px 28px 4px; } header h1{ margin:0; font-size:20px; } header a{ color:#58a6ff; }
  header p{ margin:4px 0 0; color:#8b949e; }
  main{ padding:14px 28px 50px; max-width:1120px; overflow-x:auto; }
  .meta{ color:#8b949e; font-size:12.5px; margin:0 0 12px; }
  table{ border-collapse:collapse; width:100%; background:#161b22; border:1px solid #30363d; border-radius:8px; overflow:hidden; }
  th,td{ text-align:right; padding:8px 12px; border-bottom:1px solid #21262d; font-variant-numeric:tabular-nums; white-space:nowrap; }
  th:first-child,td:first-child{ text-align:left; }
  th{ color:#8b949e; font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.04em; cursor:pointer; user-select:none; }
  th:hover{ color:#e6edf3; }
  th.sorted{ color:#58a6ff; }
  tr:last-child td{ border-bottom:none; }
  tbody tr:hover{ background:#1b2230; }
  td.tk{ font-weight:600; }
  .pos{ color:#3fb950; } .neg{ color:#f85149; } .dim{ color:#8b949e; }
  .sub{ color:#8b949e; font-size:11.5px; }
  .empty{ background:#161b22; border:1px solid #30363d; border-radius:8px; padding:30px; text-align:center; color:#8b949e; }
  .empty code{ color:#e6edf3; }
  code{ color:#e6edf3; }
</style>
</head>
<body>
<header>
  <h1>Dashboard — per-asset OOS results</h1>
  <p>From the 4.1 OOS verdict store <code>oos_metrics.db</code> · one-shot out-of-sample, all-in compounding from $1000. <a href="index.html">← back</a></p>
</header>
<main>
  <p class="meta" id="meta"></p>
  <div id="root"></div>
</main>
<script>
// columns: k=json key, t=header, num=numeric (right-align/sort), f=formatter, sign/pf=coloring
var COLS=[
  {k:'ticker',          t:'Ticker',     num:false},
  {k:'end_capital',     t:'End $',      num:true, f:function(v){return v==null?'—':(+v).toFixed(2);}},
  {k:'return_pct',      t:'Return %',   num:true, f:function(v){return v==null?'—':(+v).toFixed(2);}, sign:true},
  {k:'profit_factor',   t:'PF',         num:true, f:function(v){return v==null?'—':(+v).toFixed(2);}, pf:true},
  {k:'max_drawdown_pct',t:'Max DD %',   num:true, f:function(v){return v==null?'—':(+v).toFixed(2);}},
  {k:'win_rate_pct',    t:'Win %',      num:true, f:function(v){return v==null?'—':(+v).toFixed(1);}},
  {k:'trades',          t:'Trades',     num:true, f:function(v,r){return v==null?'—':(v+(r.wins!=null?' <span class="sub">('+r.wins+'/'+r.losses+')</span>':''));}},
  {k:'time_in_market_pct',t:'TIM %',    num:true, f:function(v){return v==null?'—':(+v).toFixed(2);}},
  {k:'cv_auc_pr',       t:'CV AUC-PR',  num:true, f:function(v){return v==null?'—':(+v).toFixed(3);}},
  {k:'oos_window',      t:'OOS window', num:false}
];
var ROWS=[], sortK='ticker', sortAsc=true;

function render(){
  var root=document.getElementById('root');
  if(!ROWS.length){
    root.innerHTML='<div class="empty">No assets yet.<br>Generate one: <code>make run-asset TICKER=AAPL</code>, then refresh with <code>make dashboard</code> (or just <code>make on</code>).</div>';
    return;
  }
  var rows=ROWS.slice().sort(function(a,b){
    var x=a[sortK], y=b[sortK];
    if(x==null)return 1; if(y==null)return -1;
    var c=(typeof x==='number'&&typeof y==='number')?(x-y):String(x).localeCompare(String(y));
    return sortAsc?c:-c;
  });
  var h='<table><thead><tr>';
  COLS.forEach(function(c){ h+='<th data-k="'+c.k+'"'+(c.k===sortK?' class="sorted"':'')+'>'+c.t+(c.k===sortK?(sortAsc?' ▲':' ▼'):'')+'</th>'; });
  h+='</tr></thead><tbody>';
  rows.forEach(function(r){
    h+='<tr>';
    COLS.forEach(function(c){
      var v=r[c.k], disp=c.f?c.f(v,r):(v==null?'—':v), cls=[];
      if(c.k==='ticker')cls.push('tk');
      if(c.sign&&typeof v==='number')cls.push(v>0?'pos':(v<0?'neg':'dim'));
      if(c.pf&&typeof v==='number')cls.push(v>1?'pos':'neg');
      h+='<td'+(cls.length?' class="'+cls.join(' ')+'"':'')+'>'+disp+'</td>';
    });
    h+='</tr>';
  });
  h+='</tbody></table>';
  root.innerHTML=h;
  var ths=root.querySelectorAll('th'),i;
  for(i=0;i<ths.length;i++)ths[i].addEventListener('click',function(){
    var k=this.getAttribute('data-k');
    if(k===sortK)sortAsc=!sortAsc; else { sortK=k; sortAsc=(k==='ticker'); }   // text asc, numbers desc on first click
    render();
  });
}

fetch('data/dashboard.json',{cache:'no-store'})
  .then(function(r){ if(!r.ok)throw 0; return r.json(); })
  .then(function(d){ ROWS=(d&&d.assets)||[];
    document.getElementById('meta').textContent=ROWS.length+' asset'+(ROWS.length===1?'':'s')+' · click a column to sort'; render(); })
  .catch(function(){ ROWS=[]; document.getElementById('meta').textContent=''; render(); });
</script>
</body>
</html>
